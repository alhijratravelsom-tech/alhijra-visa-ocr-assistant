name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install ESLint
        run: npm install eslint@8 --save-dev

      - name: Lint JavaScript files
        run: npx eslint --no-eslintrc -c .eslintrc.json *.js libs/*.js 2>&1 || true

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check JS syntax
        run: |
          for f in *.js; do
            echo "Checking $f..."
            node --check "$f" || exit 1
          done

  test:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            for f in tests/*.test.js; do
              echo "Running $f..."
              node "$f" || exit 1
            done
          else
            echo "No tests directory found"
          fi

  package:
    runs-on: ubuntu-latest
    needs: [lint, syntax-check]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r alhijra-visa-ocr-assistant-v1.0.0.zip \
            *.js *.json *.html *.css *.md \
            libs/* \
            icons/* \
            -x "*.git*" "node_modules/*" "tests/*"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: alhijra-visa-ocr-assistant-v1.0.0.zip
